---
# Implements: AUTO-2026-0019 — Standard User Account Onboarding
# Generated by: @playbook-author rule
# Spec layers applied: BEST-PRACTICES (v2.0), TEAM-PLATFORM (v1.0)

- name: Validate input contract per spec §5
  ansible.builtin.assert:
    that:
      - users is defined
      - users is iterable
      - users | length > 0
      - users | map(attribute='username') | list | length == users | length
    fail_msg: "Input validation failed — see specs/AUTO-2026-0019 §5"
    success_msg: "Input contract satisfied"
  tags:
    - "spec:AUTO-2026-0019"
    - always

- name: REQ-PLATFORM-30 — Verify host group membership
  ansible.builtin.assert:
    that:
      - "'engineering-access' in group_names"
    fail_msg: "Host {{ inventory_hostname }} not tagged engineering-access — see TEAM-PLATFORM REQ-30"
  tags:
    - "spec:AUTO-2026-0019"
    - "req:REQ-PLATFORM-30"

- name: Create groups required by user records
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ users | map(attribute='groups') | flatten | unique }}"
  loop_control:
    label: "{{ item }}"
  tags:
    - "spec:AUTO-2026-0019"

- name: REQ-1 — Create user accounts in standard UID range
  ansible.builtin.user:
    name: "{{ item.username }}"
    groups: "{{ item.groups }}"
    append: true
    state: present
    shell: /bin/bash
    create_home: true
    uid: "{{ user_onboarding_base_uid + (loop_index | int) }}"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.username }}"
    index_var: loop_index
  register: user_creation_results
  tags:
    - "spec:AUTO-2026-0019"
    - "req:REQ-1"
    - "req:REQ-2"

- name: REQ-3 — Deploy SSH authorized_keys
  ansible.posix.authorized_key:
    user: "{{ item.0.username }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
  loop: "{{ users | subelements('ssh_keys') }}"
  loop_control:
    label: "{{ item.0.username }}"
  tags:
    - "spec:AUTO-2026-0019"
    - "req:REQ-3"

- name: REQ-5 — Reconcile authorized_keys to spec input (remove unspecified keys)
  ansible.builtin.template:
    src: authorized_keys.j2
    dest: "/home/{{ item.username }}/.ssh/authorized_keys"
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: '0600'
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.username }}"
  when: user_onboarding_reconcile_keys | bool
  tags:
    - "spec:AUTO-2026-0019"
    - "req:REQ-5"

- name: REQ-PLATFORM-11 — Update CMDB with onboarding outcome
  ansible.builtin.uri:
    url: "{{ user_onboarding_cmdb_endpoint }}"
    method: POST
    body_format: json
    body:
      spec_id: "{{ spec_id }}"
      spec_version: "{{ spec_version }}"
      host: "{{ inventory_hostname }}"
      users_onboarded: "{{ users | map(attribute='username') | list }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
    headers:
      Authorization: "Bearer {{ user_onboarding_cmdb_token }}"
    status_code: [200, 201, 202]
  no_log: true
  when: user_onboarding_cmdb_endpoint != ""
  tags:
    - "spec:AUTO-2026-0019"
    - "req:REQ-PLATFORM-11"
