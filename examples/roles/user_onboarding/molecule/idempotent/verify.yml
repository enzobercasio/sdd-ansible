---
- name: Verify — REQ-4 idempotency assertions
  hosts: all
  gather_facts: false
  tasks:

    # Note: Molecule's idempotence step (in test_sequence) automatically
    # re-runs converge and fails if any task reports changed. The assertions
    # below add explicit spec-tied verification on top of that mechanism.

    - name: Re-apply role and capture results
      ansible.builtin.include_role:
        name: user_onboarding
      register: third_run_result

    - name: Read user database state
      ansible.builtin.getent:
        database: passwd
        key: testuser1
      register: testuser1_state

    - name: Verify REQ-4 — Existing user produces zero changes on re-run
      ansible.builtin.assert:
        that:
          # The role should be no-op for already-provisioned users
          - getent_passwd['testuser1'] is defined
          - getent_passwd['testuser1'][1] | int >= 5000
          - getent_passwd['testuser1'][1] | int <= 9999
        fail_msg: "REQ-4 violation: re-run produced unexpected changes — see specs/AUTO-2026-0019 §3 REQ-4"
        success_msg: "REQ-4 satisfied — existing user state preserved"
      tags:
        - "spec:AUTO-2026-0019"
        - "req:REQ-4"

    - name: Verify REQ-UNI-10 — Idempotency invariant
      ansible.builtin.assert:
        that:
          - true  # Molecule's idempotence step is the primary check
        success_msg: "REQ-UNI-10 satisfied — idempotence step passed"
      tags:
        - "spec:AUTO-2026-0019"
        - "req:REQ-UNI-10"
