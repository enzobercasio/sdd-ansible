---
# Molecule scenario: default
# Spec: AUTO-2026-0019
# Covers: REQ-1, REQ-2, REQ-3

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: instance-rhel9
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: ansible.posix.profile_tasks
  inventory:
    group_vars:
      all:
        spec_id: "AUTO-2026-0019"
        spec_version: "1.2"

verifier:
  name: ansible
